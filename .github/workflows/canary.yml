name: Production embed canaries

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-embed-canaries
  cancel-in-progress: false

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Probe production card contracts
        id: canary
        continue-on-error: true
        run: >-
          python conformance.py
          --manifest conformance/production.json
          --output conformance-report.json
      - name: Publish bounded report to the job summary
        if: always() && hashFiles('conformance-report.json') != ''
        run: |
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat conformance-report.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload bounded report
        if: always() && hashFiles('conformance-report.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-conformance-report
          path: conformance-report.json
          retention-days: 14
      - name: Enforce canary outcome
        if: always()
        run: |
          if [ "${{ steps.canary.outcome }}" != "success" ]; then
            echo "Production embed conformance failed. Review the bounded report above."
            exit 1
          fi
