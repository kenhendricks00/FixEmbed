name: Quality checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q main.py translations.py link_utils.py conformance.py card_conformance.py media_conformance.py
      - name: Run Python tests
        run: python -m unittest discover -s tests -v
      - name: Verify release metadata
        run: python scripts/check_release_metadata.py
      - name: Build SparkedHost deployment bundle
        run: python scripts/build_sparkedhost_bundle.py
      - name: Verify SparkedHost deployment bundle
        run: >-
          python scripts/build_sparkedhost_bundle.py
          --verify dist/fixembed-sparkedhost.zip
      - name: Upload SparkedHost deployment bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sparkedhost-deployment-${{ github.sha }}
          path: |
            dist/fixembed-sparkedhost.zip
            dist/fixembed-sparkedhost.manifest.json
          retention-days: 14

  service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: service/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm test
      - run: npx tsc --noEmit

  docker:
    needs: [python, service]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build Docker image
        run: docker build --tag kenhendricks00/fixembed:${{ github.sha }} .
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Publish immutable and latest tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push kenhendricks00/fixembed:${{ github.sha }}
          docker tag kenhendricks00/fixembed:${{ github.sha }} kenhendricks00/fixembed:latest
          docker push kenhendricks00/fixembed:latest
