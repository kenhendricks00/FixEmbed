  <text x="924" y="212" fill="#f2f3f5" font-family="Arial, sans-serif" font-size="18" font-weight="700">Inside the world’s most</text>
  <text x="924" y="235" fill="#f2f3f5" font-family="Arial, sans-serif" font-size="18" font-weight="700">advanced observatory</text>
  <text x="924" y="266" fill="#dbdee1" font-family="Arial, sans-serif" font-size="15">A tour behind the mirrors that</text>
