<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title description">
  <title id="title">FixEmbed Components V2 preview</title>
  <desc id="description">Four polished Discord Components V2 cards for X, Reddit, Instagram, and YouTube.</desc>

  <defs>
    <radialGradient id="background-glow" cx="50%" cy="8%" r="90%">
      <stop offset="0" stop-color="#4f46a8" stop-opacity=".28"/>
      <stop offset=".46" stop-color="#313338" stop-opacity="0"/>
      <stop offset="1" stop-color="#1e1f22" stop-opacity=".46"/>
    </radialGradient>
    <linearGradient id="x-media" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082f49"/>
      <stop offset=".45" stop-color="#0369a1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="reddit-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17113a"/>
      <stop offset=".48" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="instagram-sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset=".44" stop-color="#db2777"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="youtube-media" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset=".55" stop-color="#312e81"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="card-shadow" x="-25%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0b0c0f" flood-opacity=".5"/>
    </filter>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="x-photo"><rect x="47" y="304" width="254" height="264" rx="8"/></clipPath>
    <clipPath id="reddit-photo"><rect x="339" y="326" width="254" height="242" rx="8"/></clipPath>
    <clipPath id="instagram-photo"><rect x="631" y="284" width="254" height="284" rx="8"/></clipPath>
    <clipPath id="youtube-photo"><rect x="923" y="304" width="254" height="264" rx="8"/></clipPath>
  </defs>

  <rect width="1200" height="800" fill="#313338"/>
  <rect width="1200" height="800" fill="url(#background-glow)"/>
  <circle cx="155" cy="48" r="120" fill="#5865f2" opacity=".12" filter="url(#soft-glow)"/>
  <circle cx="1040" cy="714" r="170" fill="#eb459e" opacity=".08" filter="url(#soft-glow)"/>

