  <text x="243" y="46" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">APP</text>
  <text x="278" y="48" fill="#949ba4" font-family="Arial, sans-serif" font-size="14">Today at 2:27 PM</text>
  <text x="102" y="73" fill="#dbdee1" font-family="Arial, sans-serif" font-size="16">Here’s what your links look like after FixEmbed.</text>

