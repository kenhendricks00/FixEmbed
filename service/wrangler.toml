name = "fixembed-service"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "a34edcb892453f82fc274700c676895d"

[vars]
# Branding
SITE_NAME = "FixEmbed"
BRANDING_NAME = "FixEmbed Service"

# Domain for embeds (update when you set up ken.tools)
EMBED_DOMAIN = "fixembed.app"

# Feature flags
ENABLE_CACHE = true
CACHE_TTL = 3600

# Top.gg voter rewards (secrets are configured with `wrangler secret put`)
TOPGG_BOT_ID = "1173820242305224764"
FIXEMBED_GUILD_ID = "1195810157112852540"
FIXEMBED_VOTER_ROLE_ID = "1195810157112852544"

[dev]
port = 8787

[ai]
binding = "AI"

# Optional: KV namespace for caching
# [[kv_namespaces]]
# binding = "EMBED_CACHE"
# id = "your-kv-namespace-id"
